<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Fake Data Generator PRO</title>

<style>

body{
background:black;
color:#00ff9d;
font-family:monospace;
text-align:center;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

h1{
font-size:40px;
}

button{
background:#00ff9d;
border:none;
padding:10px 20px;
margin:6px;
font-size:15px;
border-radius:6px;
cursor:pointer;
}

input{
padding:10px;
margin:5px;
font-size:14px;
}

.box{
background:#111;
padding:20px;
margin:auto;
width:95%;
max-width:1300px;
border-radius:10px;
overflow:auto;
}

table{
width:100%;
font-size:12px;
color:white;
border-collapse:collapse;
}

td,th{
border:1px solid #222;
padding:4px;
}

tr:hover{
background:#222;
}

</style>
</head>

<body>

<canvas id="matrix"></canvas>

<h1>FAKE DATA GENERATOR PRO</h1>

Veri Sayısı
<br>

<input type="number" id="count" value="10" min="1" max="3000">

<br>

<button onclick="generate()">GENERATE</button>
<button onclick="downloadTXT()">TXT</button>
<button onclick="downloadCSV()">CSV</button>
<button onclick="downloadJSON()">JSON</button>

<br>

<input type="text" id="search" placeholder="Search..." onkeyup="search()">

<div class="box">

<div id="counter"></div>

<table id="table">

<tr>
<th>Name</th>
<th>Country</th>
<th>City</th>
<th>Address</th>
<th>Email</th>
<th>Phone</th>
<th>IP</th>
<th>GPS</th>
<th>Username</th>
</tr>

</table>

</div>

<script>

/* DATA LISTS */

var names=["Ahmet","Mehmet","Ali","Mert","Can","Eren","Burak","Kerem","Emir","Tolga","Kaan","Arda","Ozan","Baran","Umut","Serkan","Volkan","Emre","Hakan","Tuna","Deniz","Selin","Buse","Ece","Ceren","Zeynep","Fatma","Ayşe","Elif","Sude"];

var surnames=["Yılmaz","Kaya","Demir","Şahin","Çelik","Koç","Arslan","Aydın","Polat","Kurt","Bulut","Doğan","Kılıç","Yıldız","Güneş","Öztürk"];

var countries=["Turkey","Germany","USA","UK","France","Italy","Spain","Netherlands"];

var cities=["Istanbul","Ankara","Izmir","Bursa","Antalya","Adana","Trabzon","Eskisehir"];

var streets=["Ataturk Street","Cumhuriyet Street","Fatih Avenue","Baris Street","Gazi Street","Yildiz Street"];

function r(a){
return a[Math.floor(Math.random()*a.length)];
}

function ip(){
return Math.floor(Math.random()*255)+"."+Math.floor(Math.random()*255)+"."+Math.floor(Math.random()*255)+"."+Math.floor(Math.random()*255);
}

function gps(){
return (Math.random()*180-90).toFixed(6)+","+(Math.random()*360-180).toFixed(6);
}

function phone(){
return "05"+Math.floor(100000000+Math.random()*900000000);
}

function email(n,s){
return (n+"."+s+Math.floor(Math.random()*100)+"@mail.com").toLowerCase();
}

function username(n,s){
return (n+s+Math.floor(Math.random()*100)).toLowerCase();
}

function address(){
return Math.floor(Math.random()*200)+" "+r(streets);
}

var dataset=[];

function generate(){

dataset=[];

var count=document.getElementById("count").value;

var table=document.getElementById("table");

table.innerHTML="<tr><th>Name</th><th>Country</th><th>City</th><th>Address</th><th>Email</th><th>Phone</th><th>IP</th><th>GPS</th><th>Username</th></tr>";

for(let i=0;i<count;i++){

let n=r(names);
let s=r(surnames);

let row=[
n+" "+s,
r(countries),
r(cities),
address(),
email(n,s),
phone(),
ip(),
gps(),
username(n,s)
];

dataset.push(row);

let tr="<tr>";

for(let x of row){
tr+="<td>"+x+"</td>";
}

tr+="</tr>";

table.innerHTML+=tr;

}

document.getElementById("counter").innerHTML="Generated: "+dataset.length;

}

/* SEARCH */

function search(){

var input=document.getElementById("search").value.toLowerCase();

var rows=document.querySelectorAll("#table tr");

rows.forEach((r,i)=>{

if(i==0) return;

var text=r.innerText.toLowerCase();

r.style.display=text.includes(input)?"":"none";

});

}

/* DOWNLOAD */

function downloadTXT(){

let t="";

dataset.forEach(r=>t+=r.join(" | ")+"\\n");

download(t,"data.txt");

}

function downloadCSV(){

let t="";

dataset.forEach(r=>t+=r.join(",")+"\\n");

download(t,"data.csv");

}

function downloadJSON(){

download(JSON.stringify(dataset,null,2),"data.json");

}

function download(data,name){

let blob=new Blob([data]);

let a=document.createElement("a");

a.href=URL.createObjectURL(blob);

a.download=name;

a.click();

}

/* MATRIX EFFECT */

var canvas=document.getElementById("matrix");

var ctx=canvas.getContext("2d");

canvas.height=window.innerHeight;

canvas.width=window.innerWidth;

var letters="01".split("");

var fontSize=14;

var columns=canvas.width/fontSize;

var drops=[];

for(var x=0;x<columns;x++) drops[x]=1;

function draw(){

ctx.fillStyle="rgba(0,0,0,0.05)";

ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#0F0";

ctx.font=fontSize+"px monospace";

for(var i=0;i<drops.length;i++){

var text=letters[Math.floor(Math.random()*letters.length)];

ctx.fillText(text,i*fontSize,drops[i]*fontSize);

if(drops[i]*fontSize>canvas.height && Math.random()>0.975)
drops[i]=0;

drops[i]++;

}

}

setInterval(draw,33);

</script>

</body>
</html>
